services:
  postgres:
    image: postgres:16-alpine
    container_name: ledger-postgres
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
      POSTGRES_DB: ledger
    ports:
      - "5432:5432"
    volumes:
      - ledger-pgdata:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - log_statement=none
      - -c
      - log_min_duration_statement=100
      - -c
      - max_connections=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d ledger"]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  ledger-pgdata:
    name: ledger-pgdata
